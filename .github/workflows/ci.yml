name: ci
on:
  push:
    branches: [main]
  pull_request:
jobs:
  unit:
    # PyObjC is macOS-only; integration/TCC tests never run in CI (default addopts deselects them).
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4
      - uses: astral-sh/setup-uv@v5
      - run: uv sync
      - run: uv run pytest -q
